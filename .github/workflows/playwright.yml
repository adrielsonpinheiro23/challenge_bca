name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      run_docker_tests:
        description: Run Docker Compose tests
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run tests
        run: npm test
        env:
          ORANGE_HRM_PASSWORD: admin123
          ORANGE_HRM_USERNAME: Admin
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Generate Allure report
        if: always()
        run: npm run report:allure:generate

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            reports/
            allure-results/
          retention-days: 7

      - name: Upload report to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/playwright-html

  deploy-report:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Playwright report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add report link to workflow summary
        run: |
          echo "### Playwright HTML Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open report](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"

  docker-test:
    if: github.event_name == 'workflow_dispatch' && inputs.run_docker_tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          echo "REQRES_BASE_URL=https://reqres.in" >> .env
          echo "REQRES_API_KEY=${{ secrets.REQRES_API_KEY }}" >> .env
          echo "ORANGE_HRM_BASE_URL=https://opensource-demo.orangehrmlive.com" >> .env
          echo "ORANGE_HRM_USERNAME=Admin" >> .env
          echo "ORANGE_HRM_PASSWORD=admin123" >> .env

      - name: Build Docker test image
        run: docker compose build tests

      - name: Run tests in Docker
        run: docker compose run --rm tests
