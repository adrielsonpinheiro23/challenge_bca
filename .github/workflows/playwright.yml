name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      docker_test_suite:
        description: Docker Compose test suite
        required: false
        default: none
        type: choice
        options:
          - none
          - ui
          - api
          - all
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    if: github.event_name != 'workflow_dispatch' || inputs.docker_test_suite == 'none'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run tests
        run: npm test
        env:
          ORANGE_HRM_PASSWORD: admin123
          ORANGE_HRM_USERNAME: Admin
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d allure-results ]; then
            mkdir -p reports
            rm -rf reports/allure-report
            npm run report:allure:generate
          else
            echo "No allure-results directory was created by the test run."
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            reports/
            allure-results/
          retention-days: 7

      - name: Upload report to GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/playwright-html

  deploy-report:
    if: always() && github.event_name != 'pull_request' && needs.test.result != 'skipped'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Playwright report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add report link to workflow summary
        run: |
          echo "### Playwright HTML Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open report](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"

  docker-test:
    if: github.event_name == 'workflow_dispatch' && inputs.docker_test_suite != 'none'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          echo "REQRES_BASE_URL=https://reqres.in" >> .env
          echo "REQRES_API_KEY=${{ secrets.REQRES_API_KEY }}" >> .env
          echo "ORANGE_HRM_BASE_URL=https://opensource-demo.orangehrmlive.com" >> .env
          echo "ORANGE_HRM_USERNAME=Admin" >> .env
          echo "ORANGE_HRM_PASSWORD=admin123" >> .env

      - name: Build Docker test image
        run: docker compose build tests

      - name: Run selected tests in Docker
        run: |
          if [ "${{ inputs.docker_test_suite }}" = "ui" ]; then
            docker compose run --rm tests npm run test:ui
          elif [ "${{ inputs.docker_test_suite }}" = "api" ]; then
            docker compose run --rm tests npm run test:api
          else
            docker compose run --rm tests npm test
          fi

      - name: Fix Docker report permissions
        if: always()
        run: |
          sudo chown -R "$USER:$USER" reports allure-results test-results 2>/dev/null || true
          chmod -R u+rwX reports allure-results test-results 2>/dev/null || true

      - name: Setup Node for Docker report
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java for Allure
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install report dependencies
        if: always()
        run: npm ci

      - name: Generate Docker Allure report
        if: always()
        run: |
          if [ -d allure-results ]; then
            mkdir -p reports
            rm -rf reports/allure-report
            npm run report:allure:generate
          else
            echo "No allure-results directory was created by the Docker test run."
          fi

      - name: Upload Docker test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-test-report-${{ inputs.docker_test_suite }}
          path: |
            reports/
            allure-results/
            test-results/
          retention-days: 7
